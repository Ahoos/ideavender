<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>창의성자판기</title>
    <meta
      name="description"
      content="마음에 드는 키워드는 고정하고 나머지만 다시 뽑아 아이디어와 기획안 초안을 만드는 창의성자판기"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
      }
    </script>
  </head>
  <body>
    <header class="app-header">
      <nav class="topbar" aria-label="주요 메뉴">
        <a class="brand" href="#" data-action="switch-view-vending" aria-label="창의성자판기 홈">
          <span class="brand-text">창의성자판기</span>
        </a>

        <div class="topbar-actions">
          <span id="user-email" class="user-email">로그인이 필요해요</span>
          <button id="auth-toggle-btn" class="ghost-btn" type="button" data-action="toggle-auth">로그인</button>
          <button id="vault-nav-btn" class="vault-nav-btn" type="button" data-action="switch-view-vault">
            <span class="btn-label">보관함</span>
            <span id="count-badge" class="count-badge" aria-live="polite">0</span>
          </button>
        </div>
      </nav>
    </header>

    <main class="app-main">
      <section id="auth-panel" class="auth-panel" aria-labelledby="auth-heading">
        <div>
          <h2 id="auth-heading">계정으로 내 아이디어 보관하기</h2>
          <p>로그인하면 저장한 조합과 메모가 내 계정의 보관함에만 쌓입니다.</p>
        </div>
        <form id="auth-form" class="auth-form">
          <input id="auth-email" type="email" autocomplete="email" placeholder="이메일" required />
          <input id="auth-password" type="password" autocomplete="current-password" placeholder="비밀번호" required />
          <div class="auth-actions">
            <button class="save-btn" type="submit" data-auth-mode="signin">로그인</button>
            <button class="copy-btn" type="submit" data-auth-mode="signup">회원가입</button>
            <button id="signout-btn" class="copy-btn hidden" type="button">로그아웃</button>
          </div>
        </form>
      </section>

      <section id="vending-view" class="view active" aria-labelledby="machine-name">
        <nav class="type-tabs" aria-label="자판기 유형 선택">
          <button class="type-tab active" type="button" data-type-tab data-type="plot" data-action="set-type">플롯 자판기</button>
          <button class="type-tab" type="button" data-type-tab data-type="plot2" data-action="set-type">리믹스 자판기</button>
          <button class="type-tab" type="button" data-type-tab data-type="reels" data-action="set-type">릴스 자판기</button>
          <button class="type-tab" type="button" data-type-tab data-type="solution" data-action="set-type">솔루션 자판기</button>
        </nav>

        <div class="machine-wrap" role="region" aria-label="아이디어 자판기">
          <header class="machine-header">
            <p id="machine-eyebrow" class="machine-eyebrow">PLOT MACHINE</p>
            <h1 id="machine-name" class="machine-title">플롯 자판기</h1>
            <p id="machine-formula" class="machine-formula">세계관/배경 x 인물 유형 x 사건</p>
          </header>

          <div class="slots-grid" aria-live="polite" aria-atomic="true">
            <div class="slot-col">
              <span class="slot-axis" data-slot-label>세계관/배경</span>
              <div class="slot" data-slot="0" aria-label="슬롯 1">
                <span class="slot-placeholder" aria-hidden="true">READY</span>
              </div>
              <button class="lock-btn" type="button" data-action="toggle-lock" data-lock-index="0" aria-pressed="false">
                고정 안 함
              </button>
            </div>
            <div class="slot-col">
              <span class="slot-axis" data-slot-label>인물 유형</span>
              <div class="slot" data-slot="1" aria-label="슬롯 2">
                <span class="slot-placeholder" aria-hidden="true">READY</span>
              </div>
              <button class="lock-btn" type="button" data-action="toggle-lock" data-lock-index="1" aria-pressed="false">
                고정 안 함
              </button>
            </div>
            <div class="slot-col">
              <span class="slot-axis" data-slot-label>사건</span>
              <div class="slot" data-slot="2" aria-label="슬롯 3">
                <span class="slot-placeholder" aria-hidden="true">READY</span>
              </div>
              <button class="lock-btn" type="button" data-action="toggle-lock" data-lock-index="2" aria-pressed="false">
                고정 안 함
              </button>
            </div>
          </div>

          <div class="spin-row">
            <button id="spin-btn" class="spin-btn" type="button">
              <span class="btn-label">자판기 돌리기</span>
            </button>
          </div>
        </div>

        <div class="action-section">
          <label class="action-label" for="memo">거친 생각 메모</label>
          <textarea
            id="memo"
            class="memo-textarea"
            rows="4"
            placeholder="예: 학교식으로 돈을 관리하는 게임처럼, 아직 거칠지만 확장 가능한 생각"
          ></textarea>
          <div class="action-footer">
            <button id="draft-current-btn" class="copy-btn" type="button" disabled>AI 초안 만들기</button>
            <button id="save-btn" class="save-btn" type="button" disabled>보관함에 저장</button>
          </div>
        </div>
      </section>

      <section id="vault-view" class="view" aria-labelledby="vault-heading">
        <header class="vault-header">
          <div>
            <h2 id="vault-heading" class="vault-heading">아이디어 보관함</h2>
            <p class="vault-subtitle">로그인하면 내 보관함을 불러옵니다.</p>
          </div>
        </header>
        <div id="vault-grid" class="vault-grid" role="list" aria-label="보관함 카드 목록"></div>
      </section>
    </main>

    <dialog id="draft-dialog" class="draft-dialog" aria-labelledby="draft-title">
      <div class="dialog-head">
        <h2 id="draft-title">AI 기획안 초안</h2>
        <button class="icon-btn" type="button" data-action="close-draft" aria-label="닫기">X</button>
      </div>
      <pre id="draft-output" class="draft-output"></pre>
      <div class="dialog-actions">
        <button id="copy-draft-btn" class="copy-btn" type="button">초안 복사</button>
      </div>
    </dialog>

    <div id="toast-shelf" class="toast-shelf" role="status" aria-live="polite"></div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
